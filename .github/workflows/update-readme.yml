name: Update README

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update latest GitHub activity
        uses: gautamkrishnar/blog-post-workflow@master
        with:
          comment_tag_name: REPOS
          feed_list: https://github.com/bbi-yoykai1017.atom
          max_post_count: 5
          template: "- [$title]($url)"
